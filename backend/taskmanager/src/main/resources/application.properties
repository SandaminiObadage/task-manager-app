spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/taskdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hashini}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hashini123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${APP_JWT_SECRET:taskmanager-assignment-secret-key-change-in-production-123456}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

logging.level.root=INFO
logging.level.com.example.taskmanager=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n

server.port=8080