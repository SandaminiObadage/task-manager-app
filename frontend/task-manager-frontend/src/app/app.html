<div class="app-shell">
  <header class="top-bar">
    <div class="brand-block">
     
      <h1>{{ appName }}</h1>
    </div>

    <nav class="main-nav nav nav-pills" aria-label="Primary navigation" *ngIf="isAuthenticated">
      <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Tasks</a>
      <a class="nav-link" routerLink="/add" routerLinkActive="active">New Task</a>
    </nav>

    <nav class="main-nav nav nav-pills" aria-label="Authentication navigation" *ngIf="!isAuthenticated">
      <a class="nav-link" routerLink="/login" routerLinkActive="active">Login</a>
      <a class="nav-link" routerLink="/register" routerLinkActive="active">Register</a>
    </nav>

    <div class="user-chip" *ngIf="isAuthenticated">
      <span class="badge text-bg-light border">{{ currentUsername }}</span>
      <button class="btn btn-sm btn-outline-danger" type="button" (click)="logout()">Logout</button>
    </div>
  </header>

  <main class="content-panel">
    <router-outlet />
  </main>

  <app-toast />
</div>
