<section class="task-form-page">
  <header>
    <p class="kicker">Task Editor</p>
    <h2>{{ isEditMode ? 'Update Task' : 'Create Task' }}</h2>
    <p class="subtitle">Use structured details to keep your plan clear and actionable.</p>
  </header>

  <p class="state-msg" *ngIf="loading">Loading task details...</p>
  <p class="state-msg error" *ngIf="errorMessage && !loading">{{ errorMessage }}</p>
  <button
    class="retry-btn"
    type="button"
    *ngIf="isEditMode && errorMessage && !loading"
    (click)="loadTaskDetails()"
  >
    Retry loading task
  </button>

  <form [formGroup]="taskForm" (ngSubmit)="submit()" novalidate>
    <label>
      Title
      <input
        type="text"
        formControlName="title"
        placeholder="Ex: Complete full stack assignment"
        [readonly]="loading"
      />
      <small class="error" *ngIf="controlError('title')">{{ controlError('title') }}</small>
    </label>

    <label>
      Description
      <textarea
        formControlName="description"
        rows="5"
        placeholder="Optional details"
        [readonly]="loading"
      ></textarea>
      <small class="error" *ngIf="controlError('description')">{{ controlError('description') }}</small>
    </label>

    <label>
      Status
      <select formControlName="status" [disabled]="loading">
        <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
      </select>
      <small class="error" *ngIf="controlError('status')">{{ controlError('status') }}</small>
    </label>

    <div class="actions">
      <a routerLink="/">Cancel</a>
      <button type="submit" [disabled]="submitting || loading || (isEditMode && !taskLoaded)">
        {{ submitting ? 'Saving...' : (isEditMode ? 'Update Task' : 'Create Task') }}
      </button>
    </div>
  </form>
</section>
